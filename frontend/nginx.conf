server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All routes serve index.html so React Router handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent caching of index.html — always fetch the latest shell
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    # Vite outputs hashed filenames under /assets/ — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "max-age=31536000, immutable" always;
        access_log off;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Forwards /api/* to the api-gateway container in the Docker network.
    # The upstream hostname "api-gateway" matches the docker-compose service name.
    location /api/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — disable buffering for event streams
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
