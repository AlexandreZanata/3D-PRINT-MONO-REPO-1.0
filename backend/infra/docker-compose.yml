# ─── Local development infrastructure ────────────────────────────────────────
# Brings up PostgreSQL 18.1+, Redis 7, RabbitMQ 3.13, Adminer, and all four
# application services.
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml ps
#   docker compose -f infra/docker-compose.yml down          # stop, keep volumes
#   docker compose -f infra/docker-compose.yml down -v       # stop + wipe volumes

services:
  # ── PostgreSQL 18.1+ ────────────────────────────────────────────────────────
  # Required for native gen_random_uuid_v7() — see ADR-002.
  postgres:
    image: postgres:18.1-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── RabbitMQ 3.13 ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── Adminer (DB UI) ──────────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ── migrate (runs once, applies all SQL migrations in order) ─────────────────
  migrate:
    image: postgres:18.1-alpine
    container_name: migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../packages/infra/db-adapter/migrations:/migrations:ro
    command: >
      sh -c "
        psql -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecommerce} -f /migrations/00000_bootstrap.sql &&
        psql -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecommerce} -f /migrations/00001_product_rich_fields_and_site_settings.sql &&
        echo 'migrations complete'
      "


  product-service:
    build:
      context: ..
      dockerfile: infra/docker/product-service.Dockerfile
    container_name: product-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      SSE_MAX_CONNECTIONS: ${SSE_MAX_CONNECTIONS:-500}
      PRODUCT_SERVICE_PORT: 3001
    ports:
      - "${PRODUCT_SERVICE_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── admin-service ────────────────────────────────────────────────────────────
  admin-service:
    build:
      context: ..
      dockerfile: infra/docker/admin-service.Dockerfile
    container_name: admin-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../secrets/jwt.private.pem:/run/secrets/jwt_private_key:ro
      - ../secrets/jwt.public.pem:/run/secrets/jwt_public_key:ro
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      # 172.16.0.0/12 = RFC1918 172.16–172.31.x (typical Docker bridge clients)
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-127.0.0.1,::1,::ffff:127.0.0.1,172.16.0.0/12}
      ADMIN_TRUST_PROXY_HOPS: ${ADMIN_TRUST_PROXY_HOPS:-1}
      ADMIN_SERVICE_PORT: 3002
    ports:
      - "${ADMIN_SERVICE_PORT:-3002}:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── notification-service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ..
      dockerfile: infra/docker/notification-service.Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      NOTIFICATION_SERVICE_PORT: 3003
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3003}:3003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── api-gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ..
      dockerfile: infra/docker/api-gateway.Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      product-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_GATEWAY_PORT: 3000
      PRODUCT_SERVICE_URL: http://product-service:3001
      ADMIN_SERVICE_URL: http://admin-service:3002
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
